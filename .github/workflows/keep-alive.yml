name: Keep alive

on:
  schedule:
    # Run every 10 hours (at 00:00, 10:00, 20:00 UTC)
    - cron: '0 */10 * * *'

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Empty commit and push
        run: |
          git config user.name "Alifazal102"
          git config user.email "alifazal102@gmail.com"
          git commit --allow-empty -m "chore: keep-alive"
          git push
